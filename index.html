<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070b0a" />

      content="smol video is an installable PWA for reducing video dimensions and file size directly on your device."

    <div class="app-version" aria-label="App version">v0.1.1</div>
